---
# cPanel Git Version Control deployment.
# In cPanel -> Git Version Control -> Manage -> click "Deploy HEAD Commit",
# cPanel runs these tasks to copy the live site into public_html.
#
# $HOME resolves to /home/<your-cpanel-user> automatically, so no editing needed.
# If the site lives in an addon/subdomain, change public_html to that doc root.
#
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/public_html
    - /bin/mkdir -p $DEPLOYPATH/data
    - /bin/cp -R index.html .htaccess robots.txt sitemap.xml google947750ceed73bdc8.html $DEPLOYPATH
    - /bin/cp -R assets e images videos $DEPLOYPATH
    - /bin/cp -R data/index.json data/ex $DEPLOYPATH/data
